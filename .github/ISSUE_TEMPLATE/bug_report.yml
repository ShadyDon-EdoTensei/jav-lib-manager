name: Bug Report
description: Report a reproducible bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        # 🎀 JAV Lib Manager Bug Report

        Thanks for taking the time to report this issue. Please fill out the form below to help us understand and reproduce the problem.

        ---
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and expected behavior.
      placeholder: A clear and concise description...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: v1.0.0
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste logs or screenshots if available.
